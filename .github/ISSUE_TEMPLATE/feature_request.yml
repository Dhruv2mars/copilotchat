name: Feature request
description: Suggest an improvement
title: "[feat] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing or painful
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should happen instead
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Anything else that helps
